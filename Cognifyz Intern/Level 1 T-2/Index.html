<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JavaScript Mini Project</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.section{
    text-align:center;
    margin-bottom:30px;
    padding:20px;
    border-radius:10px;
    background:#f9f9f9;
}

h2{
    margin-bottom:15px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#4a6cf7;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

input{
    padding:10px;
    width:180px;
    margin:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

#result{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

@media(max-width:600px){

    input{
        width:100%;
    }

    button{
        width:100%;
        margin-top:10px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>JavaScript Mini Project</h1>

<div class="section">
    <h2>1. Change Button Color</h2>

    <button id="colorBtn" onclick="changeColor()">
        Click Me
    </button>
</div>


<div class="section">
    <h2>2. Greeting Message</h2>

    <button onclick="showGreeting()">
        Show Greeting
    </button>
</div>


<div class="section">
    <h2>3. Addition Calculator</h2>

    <input type="number" id="num1" placeholder="First Number">

    <input type="number" id="num2" placeholder="Second Number">

    <br>

    <button onclick="addNumbers()">
        Add Numbers
    </button>

    <p id="result"></p>
</div>

</div>

<script>

function changeColor(){

let button=document.getElementById("colorBtn");

button.style.backgroundColor=
button.style.backgroundColor=="tomato"
? "#4a6cf7"
: "tomato";

}

function showGreeting(){

let hour=new Date().getHours();

if(hour<12){
alert("Good Morning!");
}
else if(hour<18){
alert("Good Afternoon!");
}
else{
alert("Good Evening!");
}

}

function addNumbers(){

let n1=Number(document.getElementById("num1").value);

let n2=Number(document.getElementById("num2").value);

let sum=n1+n2;

document.getElementById("result")
.innerHTML="Result: "+sum;

}

</script>

</body>
</html>
